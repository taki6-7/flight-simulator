<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Flight Simulator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; }

    #hud {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; color: #00ff88; text-shadow: 0 0 8px #00ff88;
    }

    #top-bar {
      position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
      text-align: center; font-size: 13px; letter-spacing: 2px; opacity: 0.85;
    }
    #location { font-size: 11px; opacity: 0.7; margin-top: 4px; }

    #left-panel {
      position: absolute; top: 50%; left: 20px; transform: translateY(-50%);
      font-size: 12px; line-height: 1.8;
    }
    #right-panel {
      position: absolute; top: 50%; right: 20px; transform: translateY(-50%);
      font-size: 12px; line-height: 1.8; text-align: right;
    }

    .hud-label { color: #00cc66; font-size: 10px; letter-spacing: 1px; }
    .hud-value { font-size: 16px; font-weight: bold; }

    #artificial-horizon {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 120px; height: 120px;
    }
    #compass {
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
      font-size: 13px; letter-spacing: 4px;
    }
    #compass-rose {
      width: 200px; height: 30px; border: 1px solid #00ff8844;
      border-radius: 4px; overflow: hidden; position: relative;
    }
    #compass-tape {
      position: absolute; top: 0; white-space: nowrap; font-size: 11px;
      line-height: 30px; padding: 0 100px;
    }
    #compass-center {
      position: absolute; top: 0; left: 50%; width: 2px; height: 100%;
      background: #ff4444; transform: translateX(-50%);
    }

    #controls-hint {
      position: absolute; bottom: 16px; right: 16px;
      font-size: 10px; color: #00ff8855; line-height: 1.8; text-align: right;
    }

    #crosshair {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 20px; height: 20px;
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute; background: #00ff8888;
    }
    #crosshair::before { width: 100%; height: 1px; top: 50%; left: 0; }
    #crosshair::after { width: 1px; height: 100%; left: 50%; top: 0; }

    #stall-warning {
      position: absolute; top: 30%; left: 50%; transform: translateX(-50%);
      color: #ff4444; font-size: 24px; font-weight: bold; letter-spacing: 4px;
      text-shadow: 0 0 20px #ff4444; display: none; animation: blink 0.5s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    #throttle-bar-container {
      position: absolute; bottom: 80px; left: 20px;
    }
    #throttle-bar {
      width: 10px; height: 100px; border: 1px solid #00ff8844;
      border-radius: 4px; overflow: hidden; display: flex; flex-direction: column-reverse;
    }
    #throttle-fill {
      width: 100%; background: #00ff88; transition: height 0.1s;
    }

    #minimap {
      position: absolute; bottom: 20px; left: 20px;
      width: 140px; height: 140px; border: 1px solid #00ff8844;
      border-radius: 50%; overflow: hidden; background: rgba(0,20,10,0.6);
    }
    #minimap canvas { width: 140px; height: 140px; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <div id="hud">
    <div id="top-bar">
      <div>WORLD FLIGHT SIMULATOR</div>
      <div id="location">--</div>
    </div>

    <div id="left-panel">
      <div class="hud-label">ALTITUDE</div>
      <div class="hud-value" id="alt">0 m</div>
      <br>
      <div class="hud-label">AIRSPEED</div>
      <div class="hud-value" id="spd">0 kts</div>
      <br>
      <div class="hud-label">V/SPEED</div>
      <div class="hud-value" id="vspd">0 m/s</div>
    </div>

    <div id="right-panel">
      <div class="hud-label">HEADING</div>
      <div class="hud-value" id="hdg">000°</div>
      <br>
      <div class="hud-label">PITCH</div>
      <div class="hud-value" id="pitch">0.0°</div>
      <br>
      <div class="hud-label">BANK</div>
      <div class="hud-value" id="bank">0.0°</div>
    </div>

    <div id="crosshair"></div>

    <div id="compass">
      <div id="compass-rose">
        <div id="compass-tape">N&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;NE&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;E&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;SE&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;S&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;SW&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;W&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;NW&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;N</div>
        <div id="compass-center"></div>
      </div>
    </div>

    <div id="throttle-bar-container">
      <div class="hud-label" style="font-size:9px;margin-bottom:4px;">THR</div>
      <div id="throttle-bar"><div id="throttle-fill"></div></div>
    </div>

    <div id="minimap"><canvas id="minimap-canvas" width="140" height="140"></canvas></div>

    <div id="stall-warning">STALL</div>

    <div id="controls-hint">
      W/S — Pitch<br>
      A/D — Roll<br>
      Q/E — Yaw<br>
      ↑/↓ — Throttle<br>
      F — Flaps<br>
      G — Gear<br>
      R — Reset
    </div>
  </div>

  <script type="importmap">
    { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
  </script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
