<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>3D World Flight Simulator</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000;
      font-family:'Courier New', monospace; touch-action:none; user-select:none; }

    /* Cesium container */
    #cesiumContainer { position:fixed; inset:0; }

    /* Hide Cesium default UI */
    .cesium-widget-credits,
    .cesium-viewer-bottom { display:none !important; }

    /* ── Cockpit frame overlay ── */
    #cockpit {
      position:fixed; inset:0; z-index:8; pointer-events:none;
      background:radial-gradient(ellipse at 50% 38%, transparent 52%, rgba(0,0,0,0.65) 100%);
    }
    #cockpit::after {
      content:''; position:absolute; bottom:0; left:0; right:0; height:9%;
      background:linear-gradient(to top, #111 0%, rgba(20,20,20,0.85) 60%, transparent 100%);
    }

    /* ── HUD ── */
    #hud { position:fixed; inset:0; z-index:20; pointer-events:none;
      color:#00ff88; font-family:'Courier New',monospace; }
    .glass { background:rgba(0,0,0,0.5); border:1px solid rgba(0,255,136,0.22);
      border-radius:8px; backdrop-filter:blur(6px); }

    #hud-top { position:absolute; top:14px; left:50%; transform:translateX(-50%);
      padding:6px 18px; text-align:center; min-width:200px; }
    #hud-title { font-size:10px; letter-spacing:3px; color:rgba(0,255,136,0.55); }
    #hud-location { font-size:11px; color:rgba(0,255,136,0.85); margin-top:2px; letter-spacing:1px; }

    /* Speed tape */
    #speed-tape { position:absolute; left:12px; top:50%; transform:translateY(-50%);
      width:64px; padding:8px 6px; text-align:center; }
    /* Alt tape */
    #alt-tape { position:absolute; right:12px; top:50%; transform:translateY(-50%);
      width:68px; padding:8px 6px; text-align:right; }
    .tape-label { font-size:9px; color:rgba(0,204,102,0.7); letter-spacing:1px; }
    .tape-val   { font-size:19px; font-weight:bold; line-height:1.1; text-shadow:0 0 10px #00ff88; }
    .tape-unit  { font-size:9px; color:rgba(0,255,136,0.6); }
    .tape-sep   { margin:5px 0; border-top:1px solid rgba(0,255,136,0.15); }
    .tape-sub-label { font-size:8px; color:rgba(0,204,102,0.5); letter-spacing:1px; margin-top:4px; }
    .tape-sub-val   { font-size:12px; color:rgba(0,255,136,0.8); }

    /* Compass */
    #compass { position:absolute; bottom:170px; left:50%; transform:translateX(-50%);
      padding:5px 14px; text-align:center; min-width:210px; }
    #compass-bar { width:100%; height:24px; overflow:hidden; position:relative;
      background:rgba(0,0,0,0.3); border-radius:4px; }
    #compass-tape { position:absolute; top:0; height:100%; white-space:nowrap;
      color:#00ff88; font-size:10px; text-shadow:0 0 6px #00ff88; }
    #compass-tape span { position:absolute; top:50%; transform:translateY(-50%); }
    #compass-ptr { position:absolute; left:50%; top:0; width:2px; height:100%;
      background:#ff4444; box-shadow:0 0 8px #ff4444; transform:translateX(-50%); }
    #compass-hdg { font-size:14px; font-weight:bold; text-align:center; margin-top:3px;
      text-shadow:0 0 8px #00ff88; letter-spacing:2px; }

    /* Pitch ladder */
    #pitch-ladder { position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%); pointer-events:none; z-index:12; }

    /* Warnings */
    #stall { position:absolute; top:20%; left:50%; transform:translateX(-50%);
      color:#ff3333; font-size:22px; font-weight:bold; letter-spacing:5px;
      text-shadow:0 0 24px #ff3333; display:none; animation:blink 0.4s infinite; }
    #terrain-warn { position:absolute; top:28%; left:50%; transform:translateX(-50%);
      color:#ff8800; font-size:14px; letter-spacing:3px;
      text-shadow:0 0 14px #ff8800; display:none; animation:blink 0.5s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* Loading overlay */
    #loading {
      position:fixed; inset:0; z-index:100;
      background:linear-gradient(160deg,#050a1a,#0a0520);
      display:flex; flex-direction:column; align-items:center; justify-content:center; color:#fff;
    }
    #loading .logo { font-size:52px; margin-bottom:12px; }
    #loading h1 { font-size:20px; letter-spacing:4px; color:#00ccff; margin-bottom:6px; }
    #loading .sub { font-size:12px; color:rgba(255,255,255,0.4); margin-bottom:32px; letter-spacing:2px; }
    .spinner { width:44px; height:44px; border:3px solid rgba(0,200,255,0.15);
      border-top-color:#00ccff; border-radius:50%; animation:spin 0.8s linear infinite; }
    #loading-msg { margin-top:16px; font-size:12px; color:rgba(255,255,255,0.45); letter-spacing:1px; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ── Joystick ── */
    #joystick-zone { position:fixed; bottom:0; left:0; z-index:30;
      width:46vw; height:62vh; }
    #joystick-base { width:130px; height:130px; border-radius:50%;
      background:rgba(255,255,255,0.05); border:2px solid rgba(255,255,255,0.18);
      position:absolute; pointer-events:none; opacity:0.5; transition:opacity 0.12s; }
    #joystick-knob { width:58px; height:58px; border-radius:50%;
      background:rgba(0,160,255,0.45); border:2px solid rgba(0,200,255,0.7);
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      box-shadow:0 0 20px rgba(0,160,255,0.35); pointer-events:none; }
    #joystick-label { position:absolute; bottom:6px; width:100%; text-align:center;
      color:rgba(255,255,255,0.2); font-size:9px; letter-spacing:2px; pointer-events:none; }

    /* ── Throttle ── */
    #throttle-zone { position:fixed; bottom:16px; right:80px; z-index:30; width:44px; }
    #thr-label { text-align:center; font-size:9px; color:rgba(0,255,136,0.5);
      letter-spacing:1px; margin-bottom:4px; }
    #throttle-track { width:16px; height:144px; margin:0 auto;
      background:rgba(0,0,0,0.4); border:1px solid rgba(0,255,136,0.22);
      border-radius:8px; position:relative; }
    #throttle-fill { position:absolute; bottom:0; left:0; width:100%;
      background:linear-gradient(to top,#00ff88,#00aaff); border-radius:8px; }
    #throttle-handle { position:absolute; left:50%; transform:translateX(-50%);
      width:32px; height:20px; border-radius:5px;
      background:rgba(0,200,150,0.7); border:1px solid rgba(0,255,136,0.55); }
    #thr-pct { text-align:center; font-size:11px; color:#00ff88;
      text-shadow:0 0 6px #00ff88; margin-top:4px; }

    /* ── Buttons ── */
    #ctrl-btns { position:fixed; bottom:16px; right:12px; z-index:30;
      display:flex; flex-direction:column; gap:8px; width:66px; }
    .ctrl-btn { width:66px; height:50px; border-radius:10px;
      border:1px solid rgba(255,255,255,0.22); background:rgba(0,0,0,0.6);
      color:rgba(255,255,255,0.7); font-size:10px; letter-spacing:1px;
      font-family:'Courier New',monospace; cursor:pointer;
      backdrop-filter:blur(4px); pointer-events:auto; }
    .ctrl-btn.on { border-color:#ffcc00; color:#ffcc00;
      background:rgba(255,200,0,0.15); box-shadow:0 0 10px rgba(255,200,0,0.2); }

    /* ── Location modal ── */
    #loc-modal {
      position:fixed; inset:0; z-index:300;
      background:rgba(0,0,0,0.88);
      display:none; flex-direction:column;
      align-items:center; justify-content:center; gap:8px; padding:20px; }
    #loc-modal.show { display:flex; }
    #loc-modal h3 { color:#00ccff; font-size:12px; letter-spacing:4px; margin-bottom:4px; }
    .loc-btn {
      width:240px; padding:10px 14px;
      background:rgba(0,15,40,0.95); border:1px solid rgba(0,180,255,0.3);
      color:#00ccff; font-family:'Courier New',monospace; font-size:11px;
      border-radius:6px; cursor:pointer; text-align:left; letter-spacing:1px;
      pointer-events:auto; }
    .loc-btn:active { background:rgba(0,60,120,0.95); }
    .loc-sub { font-size:9px; color:rgba(0,180,255,0.45); margin-top:1px; display:block; }
    #loc-cancel { margin-top:6px; color:rgba(255,255,255,0.35); font-size:10px;
      background:none; border:none; cursor:pointer; letter-spacing:2px;
      font-family:'Courier New',monospace; pointer-events:auto; }

    /* ── Altitude buttons ── */
    #alt-zone { position:fixed; bottom:20px; left:172px; z-index:30;
      display:flex; flex-direction:column; gap:3px; align-items:center; }
    #alt-label { font-size:8px; color:rgba(0,255,136,0.4); letter-spacing:1px; margin:1px 0; }
    .alt-btn { width:48px; height:52px; border-radius:10px;
      border:1px solid rgba(0,255,136,0.3); background:rgba(0,0,0,0.65);
      color:#00ff88; font-size:22px; line-height:1; cursor:pointer;
      font-family:'Courier New',monospace; pointer-events:auto; }
  </style>
</head>
<body>

<!-- Loading screen -->
<div id="loading">
  <div class="logo">✈</div>
  <h1>3D FLIGHT SIMULATOR</h1>
  <div class="sub">POWERED BY CESIUM + REAL WORLD TERRAIN</div>
  <div class="spinner"></div>
  <div id="loading-msg">地形データを読み込み中...</div>
</div>

<!-- Cesium 3D globe -->
<div id="cesiumContainer"></div>

<!-- Cockpit frame -->
<div id="cockpit"></div>

<!-- HUD -->
<div id="hud">
  <div id="hud-top" class="glass">
    <div id="hud-title">3D WORLD FLIGHT SIMULATOR</div>
    <div id="hud-location">35.6762°N  139.6503°E</div>
  </div>

  <div id="speed-tape" class="glass">
    <div class="tape-label">AIRSPEED</div>
    <div class="tape-val" id="hud-spd">175</div>
    <div class="tape-unit">kts</div>
    <div class="tape-sep"></div>
    <div class="tape-sub-label">MACH</div>
    <div class="tape-sub-val" id="hud-mach">0.26</div>
  </div>

  <div id="alt-tape" class="glass">
    <div class="tape-label">ALTITUDE</div>
    <div class="tape-val" id="hud-alt">1500</div>
    <div class="tape-unit">m</div>
    <div class="tape-sep"></div>
    <div class="tape-sub-label">V/SPD</div>
    <div class="tape-sub-val" id="hud-vs">+0</div>
  </div>

  <div id="compass" class="glass">
    <div id="compass-bar">
      <div id="compass-tape"></div>
      <div id="compass-ptr"></div>
    </div>
    <div id="compass-hdg">000° N</div>
  </div>

  <svg id="pitch-ladder" width="220" height="180" viewBox="-110 -90 220 180"
       style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;">
    <!-- Horizon -->
    <line x1="-90" y1="0" x2="-22" y2="0" stroke="#00ff88" stroke-width="2" opacity="0.8"/>
    <line x1="22"  y1="0" x2="90"  y2="0" stroke="#00ff88" stroke-width="2" opacity="0.8"/>
    <!-- +5° -->
    <line x1="-38" y1="-18" x2="38" y2="-18" stroke="#00ff88" stroke-width="0.9" opacity="0.5"/>
    <text x="42" y="-15" font-size="9" fill="#00ff88" opacity="0.6" font-family="Courier New">5</text>
    <!-- +10° -->
    <line x1="-60" y1="-36" x2="60" y2="-36" stroke="#00ff88" stroke-width="0.9" opacity="0.5"/>
    <text x="64" y="-33" font-size="9" fill="#00ff88" opacity="0.6" font-family="Courier New">10</text>
    <!-- +20° -->
    <line x1="-60" y1="-72" x2="60" y2="-72" stroke="#00ff88" stroke-width="0.9" opacity="0.4"/>
    <text x="64" y="-69" font-size="9" fill="#00ff88" opacity="0.5" font-family="Courier New">20</text>
    <!-- -5° -->
    <line x1="-38" y1="18" x2="38" y2="18" stroke="#00ff88" stroke-width="0.9" opacity="0.5"/>
    <text x="42" y="21" font-size="9" fill="#00ff88" opacity="0.6" font-family="Courier New">-5</text>
    <!-- -10° -->
    <line x1="-60" y1="36" x2="60" y2="36" stroke="#00ff88" stroke-width="0.9" opacity="0.5"/>
    <text x="64" y="39" font-size="9" fill="#00ff88" opacity="0.6" font-family="Courier New">-10</text>
    <!-- Aircraft reference -->
    <line x1="-36" y1="0" x2="-12" y2="0" stroke="#ffff00" stroke-width="2.5"/>
    <line x1="12"  y1="0" x2="36"  y2="0" stroke="#ffff00" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="3.5" fill="none" stroke="#ffff00" stroke-width="2"/>
  </svg>

  <div id="stall">⚠ STALL ⚠</div>
  <div id="terrain-warn">⚠ PULL UP ⚠</div>
</div>

<!-- Location modal -->
<div id="loc-modal">
  <h3>SPAWN LOCATION</h3>
</div>

<!-- Joystick -->
<div id="joystick-zone">
  <div id="joystick-base"><div id="joystick-knob"></div></div>
  <div id="joystick-label">PITCH / BANK</div>
</div>

<!-- Altitude buttons -->
<div id="alt-zone">
  <button class="alt-btn" id="btn-alt-up">▲</button>
  <div id="alt-label">ALT</div>
  <button class="alt-btn" id="btn-alt-dn">▼</button>
</div>

<!-- Throttle -->
<div id="throttle-zone">
  <div id="thr-label">THR</div>
  <div id="throttle-track">
    <div id="throttle-fill"></div>
    <div id="throttle-handle"></div>
  </div>
  <div id="thr-pct">55%</div>
</div>

<!-- Buttons -->
<div id="ctrl-btns">
  <button class="ctrl-btn" id="btn-reset">RESET</button>
  <button class="ctrl-btn" id="btn-loc">LOC</button>
</div>

<script src="js/simulator.js?v=8"></script>
</body>
</html>
